# Starship config — minimal, fast, terminal-theme-respecting.
# Browse presets: https://starship.rs/presets/
# Reference:      https://starship.rs/config/

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "blue bold"

[git_branch]
symbol = " "
style = "purple"

[git_status]
style = "yellow"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↑${ahead_count}↓${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
stashed = ""
conflicted = "✗"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "dimmed"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
