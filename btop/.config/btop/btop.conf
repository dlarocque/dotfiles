#? Config file for btop v. 1.x
# Reference: https://github.com/aristocratos/btop#configurability

# Solarized Dark — ships with btop
color_theme = "solarized_dark"

# Use the terminal's background so it matches everything else.
theme_background = False

# Use 24-bit colors if the terminal supports them (we use Nerd Font + truecolor)
truecolor = True

# vim-style keys (j/k to move, etc.) — natural for a vim user
vim_keys = True

# Update frequency — default 2000ms is sluggish
update_ms = 1500

# Default tab on launch (one of: cpu, mem, net, proc)
shown_boxes = "cpu mem net proc"

# Sort processes by CPU usage descending
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_per_core = False
proc_mem_bytes = True
proc_info_smaps = False
proc_left = False

# Show graphs in mini mode by default
cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_single_graph = False
cpu_bottom = False

# Memory: show /, /home, etc.
mem_graphs = True
show_disks = True
only_physical = True
disks_filter = ""

# Network: auto-detect interface
net_download = 100
net_upload = 100
net_auto = True
