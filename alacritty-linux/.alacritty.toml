live_config_reload = true

# Solarized Dark — same palette as ghostty / alacritty-macos
[colors.primary]
background = "#00141a"
foreground = "#839496"

[colors.normal]
black   = "#073642"
red     = "#dc322f"
green   = "#859900"
yellow  = "#b58900"
blue    = "#268bd2"
magenta = "#d33682"
cyan    = "#2aa198"
white   = "#eee8d5"

[colors.bright]
black   = "#002b36"
red     = "#cb4b16"
green   = "#586e75"
yellow  = "#657b83"
blue    = "#839496"
magenta = "#6c71c4"
cyan    = "#93a1a1"
white   = "#fdf6e3"

[env]
TERM = "xterm-256color"

[window]
decorations = "full"

[font]
size = 16.0

[font.normal]
family = "DejaVuSansM Nerd Font Mono"
style = "Regular"

[font.bold]
family = "DejaVuSansM Nerd Font Mono"
style = "Bold"

[font.italic]
family = "DejaVuSansM Nerd Font Mono"
style = "Italic"

[scrolling]
history = 10000
multiplier = 3

# Uncomment to use an alternative clipboard provider like wl-clipboard if available
