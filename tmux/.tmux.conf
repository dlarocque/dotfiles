# ─────────────────────────────────────────────────────────────────────
# General
# ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",ghostty:Tc"

set -g history-limit 50000
set -g mouse on

set -sg escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g display-time 2000

# ─────────────────────────────────────────────────────────────────────
# Status bar
# ─────────────────────────────────────────────────────────────────────
set -g status-interval 5
set -g status-justify left
set -g status-left-length 20
set -g status-right-length 30

set -g status-style                 "bg=default fg=white"
set -g window-status-style          "fg=colour244"
set -g window-status-current-style  "fg=white bold"

set -g status-left  '#[fg=cyan] #S '
set -g status-right '#[fg=colour244]%Y-%m-%d %H:%M '

# ─────────────────────────────────────────────────────────────────────
# Prefix and reload
# ─────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

bind N if-shell "tmux list-windows -F '#{window_name}' | grep -qx notes" \
  "select-window -t notes" \
  "new-window -n notes -c '#{HOME}/notes' 'vim .'"

# ─────────────────────────────────────────────────────────────────────
# Panes and windows
# ─────────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-Up    resize-pane -U 5
bind -r C-Down  resize-pane -D 5
bind -r C-Left  resize-pane -L 5
bind -r C-Right resize-pane -R 5

# ─────────────────────────────────────────────────────────────────────
# Copy mode (vi)
# ─────────────────────────────────────────────────────────────────────
bind-key -T copy-mode-vi v send-keys -X begin-selection

# ─────────────────────────────────────────────────────────────────────
# Plugins (TPM)
# ─────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @fzf-url-history-limit '2000'
set -g @fzf-url-fzf-options '-w 60% -h 40% --multi --prompt="url> " --border'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
