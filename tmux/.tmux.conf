# ─────────────────────────────────────────────────────────────────────
# General
# ─────────────────────────────────────────────────────────────────────

# tmux-256color advertises italic + strikethrough; the override enables
# truecolor for outer terminals that pass it through.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",ghostty:Tc"

set -g history-limit 50000
set -g mouse on

# Vim-friendly: low escape time + focus events so :checktime / ALE fire
# when you cmd-tab back to a tmux pane.
set -sg escape-time 10
set -g focus-events on

# Close window 2 of 5, get 1,2,3,4 (not 1,3,4,5).
set -g renumber-windows on

# Index from 1 (your existing setting; matches the number row visually).
set -g base-index 1
setw -g pane-base-index 1

# vi keys in copy mode (single setting; was set twice before).
setw -g mode-keys vi

# Longer display-message timeout so reload confirmation is readable.
set -g display-time 2000

# ─────────────────────────────────────────────────────────────────────
# Status bar — neutral; inherits terminal background so it blends with
# pure-black terminal. Colors use 256-color names to stay readable
# regardless of which terminal palette is active.
# ─────────────────────────────────────────────────────────────────────
set -g status-interval 5
set -g status-justify left
set -g status-left-length 20
set -g status-right-length 30

set -g status-style                 "bg=default fg=white"
set -g window-status-style          "fg=colour244"
set -g window-status-current-style  "fg=white bold"

set -g status-left  '#[fg=cyan] #S '
set -g status-right '#[fg=colour244]%Y-%m-%d %H:%M '

# ─────────────────────────────────────────────────────────────────────
# Prefix and reload
# ─────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# prefix+N — jump to (or create) a "notes" window with vim open in ~/notes/
bind N if-shell "tmux list-windows -F '#{window_name}' | grep -qx notes" \
  "select-window -t notes" \
  "new-window -n notes -c '#{HOME}/notes' 'vim .'"

# ─────────────────────────────────────────────────────────────────────
# Panes and windows
# ─────────────────────────────────────────────────────────────────────

# Splits keep the current pane's working directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"

# Pane navigation without prefix (alt-arrows; you already had these)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Vim-style pane navigation with prefix (h j k l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable resize (-r lets you keep pressing arrow without re-prefix)
bind -r C-Up    resize-pane -U 5
bind -r C-Down  resize-pane -D 5
bind -r C-Left  resize-pane -L 5
bind -r C-Right resize-pane -R 5

# ─────────────────────────────────────────────────────────────────────
# Copy mode (vi)
# ─────────────────────────────────────────────────────────────────────
# `v` to start selection like vim. Yank to system clipboard is handled
# by tmux-yank (loaded below) — it picks pbcopy / xclip / wl-copy / etc.
bind-key -T copy-mode-vi v send-keys -X begin-selection

# ─────────────────────────────────────────────────────────────────────
# Plugins (TPM)
# ─────────────────────────────────────────────────────────────────────
# First run: prefix + I to install. Update: prefix + U. Remove: prefix + alt+u.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'           # prefix+u: pick a URL from pane, open it

# tmux-fzf-url: scan more lines of history, prettier fzf window
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-fzf-options '-w 60% -h 40% --multi --prompt="url> " --border'

# tmux-continuum auto save/restore sessions on tmux server start.
# Turn @continuum-restore off if surprise-restores annoy you.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM — keep at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
